services:
  - type: web
    name: finance-dashboard-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT finance_backend.wsgi:application
    healthCheckPath: /health
    disk:
      name: finance-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: FINANCE_DB_PATH
        value: /var/data/finance.db
      - key: SEED_DEMO_RECORDS
        value: true
